<!-- Maintenance modal -->
<div class="modal-overlay" id="maint-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="maint-modal-title">Log Maintenance</div>
      <button class="modal-close" onclick="closeModal('maint-modal')">✕</button>
    </div>
    <form id="maint-form" onsubmit="maintFormSubmit(event)">
      <input type="hidden" id="m-id" />
      <div class="form-grid">
        <div class="form-group col-2">
          <label>Vehicle *</label>
          <select id="m-vehicle" required>
            <option value="">Select vehicle</option>
          </select>
        </div>
        <div class="form-group">
          <label>Type *</label>
          <select id="m-type" required>
            <option value="">Select</option>
            <option>Scheduled</option><option>Breakdown</option><option>Inspection</option>
            <option>Tyres</option><option>Engine</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Cost</label>
          <input type="number" id="m-cost" min="0" step="500" placeholder="0" />
        </div>
        <div class="form-group col-2">
          <label>Technician</label>
          <input type="text" id="m-tech" placeholder="Garage name or technician" />
        </div>
        <div class="form-group col-2">
          <label>Description *</label>
          <textarea id="m-desc" placeholder="Describe the maintenance work…" required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('maint-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Record</button>
      </div>
    </form>
  </div>
</div>

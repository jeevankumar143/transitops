<!-- Generic confirm modal -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <div class="modal-title" id="confirm-title">Confirm Action</div>
      <button class="modal-close" onclick="closeModal('confirm-modal')">✕</button>
    </div>
    <p id="confirm-message" style="color:var(--text-secondary);font-size:14px;line-height:1.6"></p>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('confirm-modal')">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Confirm</button>
    </div>
  </div>
</div>

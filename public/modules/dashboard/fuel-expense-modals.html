<!-- Fuel modal -->
<div class="modal-overlay" id="fuel-modal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <div class="modal-title">Log Fuel</div>
      <button class="modal-close" onclick="closeModal('fuel-modal')">✕</button>
    </div>
    <form id="fuel-form" onsubmit="fuelFormSubmit(event)">
      <div class="form-grid">
        <div class="form-group col-2">
          <label>Vehicle *</label>
          <select id="f-vehicle" required>
            <option value="">Select vehicle</option>
          </select>
        </div>
        <div class="form-group">
          <label>Liters *</label>
          <input type="number" id="f-liters" min="0.1" step="0.1" required />
        </div>
        <div class="form-group">
          <label>Cost *</label>
          <input type="number" id="f-cost" min="0.1" step="0.01" required />
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="f-date" />
        </div>
        <div class="form-group">
          <label>Station</label>
          <input type="text" id="f-station" placeholder="Total Energies…" />
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('fuel-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Log Fuel</button>
      </div>
    </form>
  </div>
</div>

<!-- Expense modal -->
<div class="modal-overlay" id="expense-modal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <div class="modal-title">Record Expense</div>
      <button class="modal-close" onclick="closeModal('expense-modal')">✕</button>
    </div>
    <form id="expense-form" onsubmit="expenseFormSubmit(event)">
      <div class="form-grid">
        <div class="form-group col-2">
          <label>Vehicle</label>
          <select id="e-vehicle">
            <option value="">No specific vehicle</option>
          </select>
        </div>
        <div class="form-group">
          <label>Category *</label>
          <select id="e-category" required>
            <option value="">Select</option>
            <option>Toll</option><option>Maintenance</option><option>Fuel</option>
            <option>Salary</option><option>Insurance</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount *</label>
          <input type="number" id="e-amount" min="0.01" step="0.01" required />
        </div>
        <div class="form-group col-2">
          <label>Date</label>
          <input type="date" id="e-date" />
        </div>
        <div class="form-group col-2">
          <label>Description</label>
          <textarea id="e-desc" placeholder="Details…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal('expense-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Expense</button>
      </div>
    </form>
  </div>
</div>

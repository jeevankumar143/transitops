<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TransitOps — Smart Transport Operations Platform</title>
  <meta name="description"
    content="TransitOps: Manage your entire fleet, dispatch trips, track maintenance, and analyze operational costs from one intelligent platform." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>

<body>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!--  APP LAYOUT                                                  -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div class="app-layout" id="app" style="display:none">

    <!-- ── Sidebar ─────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-row">
          <div class="logo-icon">🚌</div>
          <div>
            <div class="logo-name">TRANSITOPS</div>
            <div class="logo-tag">Ministry of Transport</div>
          </div>
        </div>
      </div>

      <nav style="flex:1; padding: 8px 0;">
        <div class="sidebar-section">Main</div>
        <button class="nav-link active" id="nav-dashboard" onclick="navigate('dashboard')">
          <span class="nav-icon">📊</span><span>Dashboard</span>
        </button>

        <div class="sidebar-section">Fleet</div>
        <button class="nav-link" id="nav-vehicles" onclick="navigate('vehicles')">
          <span class="nav-icon">🚛</span><span>Vehicles</span>
        </button>
        <button class="nav-link" id="nav-drivers" onclick="navigate('drivers')">
          <span class="nav-icon">👤</span><span>Drivers</span>
        </button>

        <div class="sidebar-section">Operations</div>
        <button class="nav-link" id="nav-trips" onclick="navigate('trips')">
          <span class="nav-icon">🗺️</span><span>Trips</span>
        </button>
        <button class="nav-link" id="nav-maintenance" onclick="navigate('maintenance')">
          <span class="nav-icon">🔧</span><span>Maintenance</span>
        </button>

        <div class="sidebar-section">Finance</div>
        <button class="nav-link" id="nav-fuel" onclick="navigate('fuel')">
          <span class="nav-icon">⛽</span><span>Fuel Logs</span>
        </button>
        <button class="nav-link" id="nav-expenses" onclick="navigate('expenses')">
          <span class="nav-icon">💳</span><span>Expenses</span>
        </button>
        <button class="nav-link" id="nav-financials" onclick="navigate('financials')">
          <span class="nav-icon">📈</span><span>Analytics</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-pill">
          <div class="user-avatar" id="user-avatar">A</div>
          <div>
            <div class="user-info-name" id="user-name">Loading…</div>
            <div class="user-info-role" id="user-role">—</div>
          </div>
          <button class="logout-btn" title="Sign out" onclick="logout()">⏻</button>
        </div>
      </div>
    </aside>

    <!-- ── Main Content ─────────────────────────────────────────── -->
    <main class="main-content">
      <!-- Official government top bar -->
      <div
        style="background:#0f2547;color:rgba(255,255,255,0.65);font-size:11px;padding:6px 28px;display:flex;align-items:center;gap:8px;letter-spacing:0.3px;">
        🏛️ <strong style="color:rgba(255,255,255,0.9)">Official Government System</strong> — Ministry of Transport
        &amp; Infrastructure | All access is logged and monitored
      </div>
      <!-- Flag stripe -->
      <div
        style="height:3px;background:linear-gradient(to right,#1a5f1a 33.3%,#c8972a 33.3%,#c8972a 66.6%,#a31d1d 66.6%)">
      </div>
      <header class="header">
        <div>
          <div class="header-title" id="page-title">Dashboard</div>
          <div class="header-sub" id="page-sub">Fleet overview & KPIs</div>
        </div>
        <div class="header-actions" id="header-actions">
          <!-- Dynamic action buttons injected by JS -->
        </div>
      </header>

      <!-- ── Pages ──────────────────────────────────────────────── -->
      <div id="page-dashboard" class="page active"></div>
      <div id="page-vehicles" class="page"></div>
      <div id="page-drivers" class="page"></div>
      <div id="page-trips" class="page"></div>
      <div id="page-maintenance" class="page"></div>
      <div id="page-fuel" class="page"></div>
      <div id="page-expenses" class="page"></div>
      <div id="page-financials" class="page"></div>
    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Container where modular topic modals are loaded dynamically -->
  <div id="modals-container"></div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!--  JS MODULES                                                  -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <script src="/js/auth.js"></script>
  <script src="/js/vehicles.js"></script>
  <script src="/js/drivers.js"></script>
  <script src="/js/trips.js"></script>
  <script src="/js/maintenance.js"></script>
  <script src="/js/dashboard.js"></script>

</body>

</html>
